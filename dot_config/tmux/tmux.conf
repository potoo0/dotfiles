### vim:set ft=tmux:
############################# tmux config #############################
# : << 'EOF' do not edit!
# 作用: polyglot file 用法, 让 tmux.conf 也能当做 shell 脚本执行
# 用法: `cut -c3- t.conf | bash -s func_name`
# 注意: E-O-F 之外的注释符号必须位于第二列之后, E-O-F 之间的会被重定向到 `:`, 也就是丢弃.

# `tmux -V` > tmux3.2a+
#   tmux 3.4 以上支持 run-shell 增加可选项 -c 来指定工作目录(issue 3661), eg: `-c '#{pane_current_path}'`
# config path: /etc/tmux.conf, ~/.config/tmux/tmux.conf, ~/.tmux.conf
# set(set-option)/show(show-options):
#   - 如果选项不是用户选项，则 -w(window) 或 -s(server) 可省略，tmux 会根据设置名称自动推断.
#   - 如果未指定且推断结果不是 window/server, 则会使用默认: session 级别
# setw: set -w 的简写
# bind(bind-key): 默认绑定到 prefix 表格中(相当于指定参数 -Tprefix), -N 用来写备注
# 关于调试:
#   - `tmux -v` 打印日志, 在 server 日志中查看变量/命令解析和执行
#   - `tmux display -p 'selection_active=#{selection_active}`
#   - `tmux show -g mode-keys`
#   - 查看快捷键: `list-keys`
# window / pane 名词:
#   window: session 下的单元, 一个 window 对应 status 的一个 tab;
#   pane:   window  下的单元, 一个 window 可以分割成多个 pane
# 命令语法: https://man.archlinux.org/man/tmux.1#PARSING_SYNTAX

# --------------------------- general ---------------------------
set -g default-terminal "screen-256color" # 也会作为环境变量 TERM 的默认值
if 'infocmp -x tmux-256color > /dev/null 2>&1' 'set -g default-terminal "tmux-256color"'

set -g history-limit 100000 # default is 2000

set -g mode-keys vi         # copy-mode 下的快捷键, 此处设置防止受到环境变量 VISUAL / EDITOR 的影响
set -g status-keys vi       # command prompt 下的快捷键, 此处设置防止受到环境变量 VISUAL / EDITOR 的影响
set -g set-titles on        # 允许 tmux 自动设置终端模拟器窗口标题, 默认格式见: `show -g set-titles-string`
                            #   因为本配置文件也关闭了其他 rename, 会导致标题被程序修改后无法重置,
                            #   可通过关闭 allow-set-title 来禁止
set -g set-titles-string '#S:#{?#{m/r:^(zsh|bash)$,#W},#I,#W}.#{pane_index} - #h'
                            # pane 切换时被计算.
                            # 此表达式含义: 如果 window name 不为默认的 zsh/bash 则使用 window name, 否则使用 window index
set -g automatic-rename off # 禁止 window auto-rename(打开会在每次执行命令后自动重命名, 
                            #   如果开启了 set-titles 也会被传递到终端模拟器窗口标题)
set -g allow-rename off     # 禁止 pane 的程序修改 window 的名称
set -g renumber-windows on  # window 销毁后对 window 重新编号
set -g base-index 1         # window 编号起始为 1, default is 0
set -g pane-base-index 1    # pane 编号起始为 1

set -g focus-events on      # 传递 focus 事件给 tmux 内运行的程序
set -g set-clipboard on     # 相比 external 可以额外接受应用的 OSC52, 这样 tmux 嵌套也可透传 copy-mode 复制的内容

# activity 与 bell(https://github.com/tmux/tmux/wiki/Advanced-Use#alerts-and-monitoring):
#   activity: 有输出(stdout/stderr), 比如 tail -f ...
#   bell    : 发送了 ASCII BEL, 比如 bash/zsh: echo -e '\a'
set -g monitor-activity on  # 监视 activity
set -g visual-activity off  # 有活动时只 bell, 而不要状态栏显示 message

# set ctrl-a as secondary prefix key
set -g prefix2 C-a
bind -N 'secondary prefix key' C-a send-prefix -2

# --------------------------- key table=root ---------------------------
# bind ctrl+tab for next-window.
#     mintty 需要关闭 *Switch window*
#     windows terminal 需要增加 actions: { "command": {"action": "sendInput", "input": "\u001b[27;5;9~"}, "keys": "ctrl+tab" }
%if #{MSYSTEM}
  set -s user-keys[0] "\e[1;5I"                           
  bind -nr -N 'switch to next window' User0 next-window
%else
  bind -nr -N 'switch to next window' C-Tab next-window
%endif
bind -nr -N 'jump to claude/codex window' M-g {
  if-shell '[ -f "$HOME/.config/tmux/tmux.conf" ]' {
    popup -E -d "#{pane_current_path}" -h 70% -w 85% -b rounded -S 'fg=#5f87af' 'cut -c3- "$HOME/.config/tmux/tmux.conf" | bash -s tmux_jump_window_popup'
  } {
    popup -E -d "#{pane_current_path}" -h 70% -w 85% -b rounded -S 'fg=#5f87af' 'cut -c3- /etc/tmux.conf | bash -s tmux_jump_window_popup'
  }
}

# --------------------------- key table=prefix ---------------------------
bind -N 'switch to last window'      Tab last-window
bind -N 'create session'             C-c new-session
bind -N 'split-window horizontally'  -   split-window -v -c "#{pane_current_path}"
bind -N 'split-window vertically'    _   split-window -h -c "#{pane_current_path}"
bind -N 'toggle zoom'                +   resize-pane -Z
bind -N 'terminal SIGHUP'            C-d detach -P
bind -N 'open popup'                 C-p popup -d "#{pane_current_path}" -h 60% -w 80% -b rounded -S 'fg=#5f87af'
bind -N 'kill pane child process'    C-k {
  run -b 'PANE_PID=#{pane_pid}
    PANE_TTY=#{pane_tty}
    processes_file="$(mktemp /tmp/tmux-kill-processes.XXXXXX)" || exit 1

    ps -t "$PANE_TTY" -o pid=,command= |
      awk -v pane_pid="$PANE_PID" "\$1 != pane_pid" > "$processes_file"
    if [ ! -s "$processes_file" ]; then
      rm -f "$processes_file"
      tmux display ">>>no process found for pane tty $PANE_TTY"
      exit 0
    fi

    set -- -T "Kill process" -x C -y C \
      -b heavy -S "fg=#8bd5ca,bold" \
      -s "fg=#c0c0c0,bg=#080808" \
      -H "fg=#7dc4e4,bg=#303030,bold"

    while IFS= read -r process; do
      pid="${process%% *}"
      item="$(printf "  %-88.88s  " "$process")"
      command="run -b \"kill -KILL -- $pid && tmux display \\\">>>killed process $pid\\\" || tmux display \\\">>>failed to kill process $pid\\\"\""
      set -- "$@" "$item" "" "$command"
    done < "$processes_file"

    rm -f "$processes_file"
    tmux display-menu "$@"
  '
}
#bind -N 'clear screen and history'   C-l send-keys C-l \; run 'sleep 0.1' \; clear-history
bind -N 'clear screen and history'   C-l {
  send-keys C-l
  run 'sleep 0.1'
  clear-history
  display ">>>screen and history cleared"
}
bind -N 'toggle mouse mode'          m   {
  set mouse #{?mouse,off,on}
  display ">>>mouse: #{?mouse,on,off}"
}
bind -N 'save pane history to file'   C-s {
  command-prompt \
      -I '-#{history_limit},~/tmux-cap-#{session_name}-#{window_index}-#{pane_index}-%Y%m%d%H%M%S.log' \
      -p 'start-line relative to visible pane:,save to:' {
    run "tmux capture-pane -pS %1 > %2 \\; display '>>>saved pane history(start-line=%1) to file %2'"
  }
}
bind -N 'reload config'              r {
  source-file -q /etc/tmux.conf ~/.config/tmux/tmux.conf ~/.tmux.conf
  display '>>>config reloaded'
}
bind -N 'choose a paste buffer from a list' b choose-buffer
bind -N 'save clipboard image to tmp and buffer path' Y {
  if-shell '[ -f "$HOME/.config/tmux/tmux.conf" ]' {
    run -b 'cut -c3- "${HOME}/.config/tmux/tmux.conf" | bash -s tmux_save_clipboard_image'
  } {
    run -b 'cut -c3- /etc/tmux.conf | bash -s tmux_save_clipboard_image'
  }
}
bind -N 'toggle synchronize-panes'   s {
  set synchronize-panes
  display ">>>synchronize-panes: #{?synchronize-panes,on,off}"
}
bind -N 'create window from pane current path' C   new-window -c "#{pane_current_path}"
bind -N 'update current session working path'  M-c {
  attach-session -c "#{pane_current_path}"
  display ">>>session #{session_name} working path updated to #{pane_current_path}"
}

# --------------------------- key table=prefix, quick search ---------------------------
set -g @search_path_re "(/[^][ '\"]+|[^][ '\"]*/|[^][ '\"]*\\\.[^][ '\"]+)[^][ '\"]*"
set -g @search_ip_re "[[:digit:]]{1,3}\\.[[:digit:]]{1,3}\\.[[:digit:]]{1,3}\\.[[:digit:]]{1,3}"
set -g @search_url_re "(https?://|git@|git://|ssh://|ftp://|file:///)[[:alnum:]?=%/_.:,;~@!#$&()*+-]*"

bind -N 'search backward menu' M-f {
  display-menu -T 'Search backward' -C 0 \
    'Path' p {
      copy-mode
      display ">>> Search path"
      send-keys -F -X search-backward '#{@search_path_re}'
    } \
    'IP' i {
      copy-mode
      display ">>> Search ip"
      send-keys -F -X search-backward '#{@search_ip_re}'
    } \
    'URL' u {
      copy-mode
      display ">>> Search url"
      send-keys -F -X search-backward '#{@search_url_re}'
    }
}

# --------------------------- key table=copy-mode-vi ---------------------
bind -T copy-mode-vi -N 'move to previous word'     C-Left  send -X previous-word
bind -T copy-mode-vi -N 'move to next word'         C-Right send -X next-word
bind -T copy-mode-vi -N 'clear selection or cancel' Escape  {
  if -F '#{selection_present}' \
    'send-keys -X clear-selection' \
    'send-keys -X cancel'
}
bind -T copy-mode-vi -N 'search backward menu'      M-f {
  display-menu -T 'Search backward' -C 0 \
    'Path' p {
      display ">>> Search path"
      send-keys -F -X search-backward '#{@search_path_re}'
    } \
    'IP' i {
      display ">>> Search ip"
      send-keys -F -X search-backward '#{@search_ip_re}'
    } \
    'URL' u {
      display ">>> Search url"
      send-keys -F -X search-backward '#{@search_url_re}'
    }
}

# --------------------------- key mode: on/off ---------------------------
%if #{MSYSTEM}
  bind -T keymode-off -r -N 'send Ctrl+Tab to pane' User0 send-keys Escape '[27;5;9~'
%else
  bind -T keymode-off -r -N 'send Ctrl+Tab to pane' C-Tab send-keys Escape '[27;5;9~'
%endif
bind -T root        -N 'disable keys'   F12 {
  set prefix None
  set prefix2 None
  set key-table keymode-off
  set status-style 'fg=#8a8a8a,bg=#5f5f87'
  set pane-active-border-style 'fg=#8a8a8a,bg=#5f5f87'
  set pane-border-status top
  set -p @keymode_off 1
}
bind -T keymode-off -N 'enable keys'    F12 {
  set -u prefix
  set -u prefix2
  set -u key-table
  set -u status-style
  set -u pane-active-border-style
  set -u pane-border-status
  set -p @keymode_off 0
}

# --------------------------- status bar ---------------------------
set -g display-time 3000  # 状态栏消息显示时间
# prefix 按下以及鼠标模式 右下角提示, 以及修改时间格式为 15:16 23/02/24
# 原配置: `tmux display -p '#{status-right}'`
# ---------- status-right segments ----------
set -g @sr_keymode '#{?@keymode_off,#[fg=red bg=#303030]Key:OFF#[fg=default bg=default] | ,}'
set -g @sr_sync    '#{?pane_synchronized,#[fg=yellow]S#[fg=default] | ,}'
set -g @sr_mouse   '#{?mouse,↖ | ,}'
# 是否处于 prefix 模式, 按下 prefix 键后会进入 prefix 模式
set -g @sr_prefix  '#{?client_prefix,#[reverse]<C>#[noreverse] | ,}'
set -g @sr_offset  '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] | ,}'
# 双引号包裹的 pane_title, 默认是 hostname, 超过 12 的字符会截断并末尾加 -
set -g @sr_title   '"#{=/12/-:pane_title}" | '
set -g @sr_clock   '%H:%M %d/%m/%y'

# ---------- status-right ----------
# Key:OFF | S | ↖ | <C> | [offset] | title | clock
set -g status-right '#{E:@sr_keymode}#{E:@sr_sync}#{E:@sr_mouse}#{E:@sr_prefix}#{E:@sr_offset}#{E:@sr_title}#{E:@sr_clock}'

# 以下配色方案取自 gpakosz/.tmux
set -g status-style                 'fg=#8a8a8a,bg=#080808'  # 状态栏样式
set -g message-style                'fg=#ffff00,bg=#080808'  # 状态栏消息样式
set -g message-command-style        'fg=#ffff00,bg=#080808'  # 状态栏消息样式
set -g mode-style                   'fg=#080808,bg=#00afff'  # c-w(choose-tree) 的样式

# 状态栏窗口样式. 注意: activity/bell 会被(来源不明?)修改为 reverse(fg与bg交换),
#    如果打开了 monitor-activity 则可能会导致通过脚本创建的初始窗口触发 activity 进而交换了 fg/bg, 所以此处修改它们
set -g window-status-activity-style 'fg=default,bg=default,underscore'
set -g window-status-bell-style     'fg=#ffff00,bg=default,blink,bold'
set -g window-status-current-style  'fg=#080808,bg=#00afff,bold'       # 当前激活 window 样式
set -g window-status-last-style     'fg=#00afff,bg=#303030,none'       # 上次激活 window 样式
set -g window-status-style          'fg=#8a8a8a,bg=#080808,none'       # window 默认样式

